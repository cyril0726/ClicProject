<!DOCTYPE html>
<html>
<head>
  <title>ClicProject</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <!-- Section Score -->
    <div id="score-section">
      <div id="score-display">Argent: <span id="score">50</span> €</div>
    </div>

    <!-- Section Stock -->
    <div id="stock-section">
      <h2>Stock :</h2>
      <div id="products">
        <!-- Exemple de produit -->
        <div class="product">
          <h3>Drogue</h3>
          <div class="product-actions">
            <button class="buy">Acheter</button>
            <button class="sell">Vendre</button>
          </div>
        </div>
        <!-- Ajoute d'autres produits ici -->
        <div class="product">
          <h3>Alcool</h3>
          <div class="product-actions">
            <button class="buy">Acheter</button>
            <button class="sell">Vendre</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Section Boutons -->
    <div id="buttons-section">
      <button id="reset">Réinitialiser</button>
      <button id="auto-increment">Auto incr : 1/s</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
