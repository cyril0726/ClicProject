<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClicProject</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <!-- Section Score -->
    <div id="score-section">
      <div id="score-display">Argent: <span id="score">50</span> €</div>
    </div>

    <!-- Section Stock -->
    <div id="stock-section">
      <h2>Stock :</h2>
      <div class="products-row">
        <div class="product">
          <h3>Drogue</h3>
          <div class="product-info">
            <span class="product-price" id="drug-price">Prix: <span>10</span> €</span>
            <span class="product-stock">Stock: <span id="drug-stock">0</span></span>
          </div>
          <div class="product-actions">
            <button class="buy" data-product="drug">Acheter</button>
            <button class="sell" data-product="drug">Vendre</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Section Équipe (masquée au début) -->
    <div id="team-section" style="display: none;">
      <h2>Équipe :</h2>
      <div class="products-row">
        <div class="product">
          <h3>Dealer</h3>
          <div class="product-info">
            <span class="product-price" id="dealer-price">Prix: <span>500</span> €</span>
            <span class="product-stock">Possédés: <span id="dealer-stock">0</span></span>
            <div class="dealer-settings">
              <label for="dealer-sell-price">Prix de vente :</label>
              <input type="number" id="dealer-sell-price" value="10" min="1">
              <br>
              <label for="dealer-buy-price">Prix d'achat :</label>
              <input type="number" id="dealer-buy-price" value="5" min="1">
            </div>
          </div>
          <div class="product-actions">
            <button class="buy" data-product="dealer">Acheter</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Section Boutons (masqués par défaut) -->
    <div id="buttons-section" style="display: none;">
      <button id="reset">Réinitialiser</button>
    </div>
    <div id="score-buttons-section" style="display: none;">
      <button id="add-10">+10</button>
      <button id="add-100">+100</button>
      <button id="add-1000">+1000</button>
    </div>
  </div>

  <!-- Éléments pour la police -->
  <div id="police-alert" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; cursor: pointer;">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/Police_france_logo.svg/1200px-Police_france_logo.svg.png" alt="Police" style="width: 150px; height: auto;">
    <p style="text-align: center; color: red; font-weight: bold;">CLIQUEZ VITE !</p>
  </div>

  <!-- Modale patch note -->
  <div id="update-modal" class="modal">
    <strong>Nouveautés :</strong>
    <p id="update-modal-text"> 14/03 : La police est là !</p>
    <button id="close-modal" class="close-modal">✕</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
